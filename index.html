<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EYTAN STOK | The Freedom Ledger</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f6f1e3; /* נייר מיושן */
            --text-dark: #1e1e1e;
            --accent-gold: #b2935b;
            --accent-green: #2d5a27;
            --accent-blue: #007bff; /* צבע הסליידר */
            --accent-purple: #9370db; /* צבע הכפתור הסגול מהתמונה */
            --border-color: #d1ccbc;
            --font-serif: 'Times New Roman', Times, serif;
            --font-sans: 'Arial', sans-serif;
        }

        body {
            font-family: var(--font-serif);
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            direction: rtl; /* כיוון כללי מימין לשמאל */
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            border-top: 4px double var(--text-dark);
            border-bottom: 4px double var(--text-dark);
            padding: 20px 0;
            position: relative;
        }

        /* סקציית הכותרת */
        header {
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 20px;
            position: relative;
        }

        .vol-info {
            position: absolute;
            top: 0;
            right: 0;
            font-size: 12px;
            text-transform: uppercase;
            font-family: var(--font-sans);
        }

        .date-info {
            position: absolute;
            top: 0;
            left: 0;
            font-size: 12px;
            font-family: var(--font-sans);
        }

        .currency-switch {
            position: absolute;
            top: 30px;
            left: 0;
            display: flex;
            border: 1px solid var(--border-color);
            overflow: hidden;
            font-family: var(--font-sans);
        }

        .currency-switch button {
            background: #e8e1cd;
            border: none;
            padding: 5px 10px;
            font-size: 12px;
            cursor: pointer;
        }

        .currency-switch button.active {
            background: #fff;
            color: #000;
        }

        h1 {
            font-size: 60px;
            margin: 10px 0 0;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 900;
            color: var(--text-dark);
        }

        .subtitle {
            font-style: italic;
            color: var(--accent-gold);
            font-size: 20px;
            margin-top: -5px;
        }

        .tabs {
            margin-top: 20px;
            font-family: var(--font-sans);
            font-weight: bold;
        }

        .tab {
            margin: 0 15px;
            color: #777;
            cursor: pointer;
        }

        .tab.active {
            color: var(--text-dark);
            border-bottom: 2px solid var(--accent-gold);
        }

        .tab-prompt {
            position: absolute;
            right: 0;
            top: 20px;
            color: #777;
            font-size: 14px;
        }

        /* פריסה דו-עמודתית */
        .main-content {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 30px;
        }

        /* סיידבר של תשומות */
        .sidebar {
            background: #f1ebd7;
            padding: 20px;
            border: 1px solid var(--border-color);
        }

        .sidebar h2 {
            font-size: 20px;
            border-bottom: 1px solid var(--text-dark);
            padding-bottom: 5px;
            margin-bottom: 15px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 5px;
            font-family: var(--font-sans);
        }

        input {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--border-color);
            background: transparent;
            font-size: 16px;
            box-sizing: border-box;
            font-family: var(--font-serif);
        }

        .slider-group {
            margin-top: 20px;
        }

        .slider-group label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 5px;
            font-family: var(--font-sans);
        }

        .slider-row {
            display: flex;
            align-items: center;
        }

        input[type="range"] {
            flex-grow: 1;
            -webkit-appearance: none;
            background: transparent;
            border: none;
            padding: 0;
            margin: 0;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            height: 10px;
            background: #dcd7c5;
            border-radius: 5px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            background: var(--accent-blue);
            border-radius: 50%;
            cursor: pointer;
            margin-top: -5px; /* ממקם את הבוהן במרכז */
        }

        .slider-value {
            margin-left: 10px;
            font-family: var(--font-serif);
            font-size: 16px;
        }

        .advanced-group {
            margin-top: 20px;
        }

        .scenario-buttons, .nominal-real-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            font-family: var(--font-sans);
        }

        .scenario-button, .nominal-real-button {
            background: #e8e1cd;
            border: none;
            padding: 5px 10px;
            font-size: 12px;
            cursor: pointer;
            flex: 1;
            text-align: center;
        }

        .scenario-button.active, .nominal-real-button.active {
            background: #fff;
            color: #000;
        }

        .advanced-toggle {
            cursor: pointer;
            text-decoration: underline;
            color: #777;
            font-family: var(--font-sans);
            margin-top: 15px;
            display: block;
        }

        .advanced-options {
            display: none;
            margin-top: 15px;
        }

        .advanced-options.active {
            display: block;
        }

        /* פאנל תוצאות */
        .results-panel {
            text-align: center;
        }

        .big-number-box {
            background: #fdfbf7;
            padding: 40px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
            position: relative;
        }

        .total-label {
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: var(--font-sans);
            color: #777;
        }

        .total-value {
            font-size: 90px;
            color: var(--accent-gold);
            font-weight: bold;
            margin: 10px 0;
            font-family: var(--font-serif);
        }

        .passive-income {
            font-style: italic;
            font-size: 20px;
            color: var(--text-dark);
        }

        /* רשת מדדים */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
            text-align: center;
        }

        .stat-card {
            border: 1px solid var(--border-color);
            padding: 20px;
            background: #fdfbf7;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: var(--accent-green);
            font-family: var(--font-serif);
        }

        .stat-label {
            font-size: 14px;
            text-transform: uppercase;
            color: #777;
            font-family: var(--font-sans);
            margin-top: 5px;
        }

        /* סקציית גרפים */
        .graphs-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .graph-card {
            background: #fdfbf7;
            padding: 20px;
            border: 1px solid var(--border-color);
            text-align: center;
            position: relative;
        }

        .graph-title {
            font-style: italic;
            font-size: 20px;
            margin-bottom: 10px;
            text-align: left; /* השאר את האנגלית מיושרת לשמאל כפי שבתמונה */
            font-family: var(--font-serif);
        }

        .graph-legend {
            font-size: 12px;
            color: #777;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-family: var(--font-sans);
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .legend-item {
            display: flex;
            align-items: center;
        }

        .legend-color {
            width: 10px;
            height: 10px;
            margin-right: 5px;
        }

        .graph-caution-number {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 14px;
            font-weight: bold;
            color: #c33; /* אדום כהה לזהירות */
            font-family: var(--font-sans);
            background: rgba(255,255,255,0.7);
            padding: 2px 5px;
            border-radius: 3px;
        }

        canvas {
            width: 100% !important;
            height: 300px !important;
        }

        /* סקציית הפוטר */
        footer {
            margin-top: 40px;
            text-align: center;
        }

        .footer-banner {
            background: #eee6d3;
            padding: 20px;
            text-align: center;
            font-style: italic;
            font-size: 22px;
            margin-top: 30px;
            border: 1px solid var(--border-color);
            position: relative;
        }

        .footer-banner span {
            color: var(--accent-gold);
            font-weight: bold;
        }

        .purple-button-section {
            background: #fffef8;
            padding: 40px;
            border-top: 2px solid var(--border-color);
            border-bottom: 2px solid var(--border-color);
            margin-top: 20px;
        }

        .know-the-number {
            font-size: 36px;
            margin-bottom: 10px;
            font-family: var(--font-serif);
        }

        .know-the-number span {
            font-style: italic;
            color: var(--accent-gold);
        }

        .join-text {
            color: #777;
            max-width: 600px;
            margin: 0 auto 20px auto;
            font-family: var(--font-serif);
            font-style: italic;
        }

        /* הכפתור הסגול הבוהק עם הטקסט המעודכן */
        .purple-button {
            display: inline-block;
            background: var(--accent-purple);
            color: #fff;
            padding: 15px 30px;
            border-radius: 5px;
            text-decoration: none;
            font-family: var(--font-sans);
            font-weight: bold;
            font-size: 18px;
            transition: background 0.3s;
        }

        .purple-button:hover {
            background: #7b68ee; /* גוון בהיר יותר בהעברה של העכבר */
        }

        .disclaimer {
            font-size: 11px;
            color: #999;
            margin-top: 20px;
            text-transform: uppercase;
            font-family: var(--font-sans);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="vol-info">VOL. I • NO. 1</div>
        <div class="date-info">APR 23, 2026</div>
        <div class="currency-switch">
            <button class="active">USD$</button>
            <button>ILS
